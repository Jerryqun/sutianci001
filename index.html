<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广东省特种设备检测研究院</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: "SimSun", "宋体", serif;
            margin: 0;
            padding: 0;
            color: #000;
            line-height: 1.8;
            background: #fff;
            overflow-x: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
            width: 100%;
            max-width: 100vw;
        }

        .report-number {
            width: 100%;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 10px 0 20px;
            border-bottom: 1px solid #333;
            width: 100%;
            overflow: visible;
        }

        .header-row img {
            max-width: 120px;
            height: auto;
            flex-shrink: 0;
        }

        .header-row .title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            font-family: "SimHei", "黑体", sans-serif;
            margin: 0;
        }

        .info-section {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }

        .info-item {
            font-size: 14px;
            margin-bottom: 10px;
            text-align: left;
            line-height: 2;
            display: flex;
            align-items: baseline;
        }

        .info-label {
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .info-value {
            flex: 1;
            border-bottom: 1px solid #eee;
            margin-left: 5px;
            padding-bottom: 2px;
        }

        .footer {
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: auto;
            padding-top: 20px;
            padding-bottom: 20px;
            /* border-top: 1px solid #ddd; */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media print {
            body {
                padding: 40px 60px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="report-number">
            <span class="info-label">报告编号：</span>BWTQDPG-E22600009
        </div>

        <div class="header-row">
            <img src="logo.png" alt="GDSEI Logo and CMA Certification">
            <h1 class="title">广东省特种设备检测研究院</h1>
        </div>

        <div class="info-section">

            <div class="info-item">
                <span class="info-label">工程名称：</span><span class="info-value">广州市黄埔区科学城接知识城快速通道北段</span>
            </div>

            <div class="info-item">
                <span class="info-label">工程地址：</span><span class="info-value">广州市黄埔区科学城接知识城快速通道北段</span>
            </div>

            <div class="info-item">
                <span class="info-label">使用单位：</span><span class="info-value">冷水江市鸿荣旺吊车吊装服务有限公司</span>
            </div>

            <div class="info-item">
                <span class="info-label">检验单位：</span><span class="info-value">广东省特种设备检测研究院</span>
            </div>

            <div class="info-item">
                <span class="info-label">检验日期：</span><span class="info-value">2026 年 06 月 12 日</span>
            </div>

            <div class="info-item">
                <span class="info-label">检测机构：</span><span class="info-value">广东省特种设备检测研究院</span>
            </div>

            <div class="info-item">
                <span class="info-label">检验结论：</span><span class="info-value">合格</span>
            </div>
        </div>

        <div class="footer">
            Copyright &copy; 2018–2028 广东省特种设备检测研究院 All Rights Reserved.
        </div>
    </div>
</body>
</html>
